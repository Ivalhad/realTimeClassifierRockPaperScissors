<!DOCTYPE html>
<html lang="id">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Rock Paper Scissors Image Classifier</title>
	<meta name="description" content="Real-time rock, paper, scissors detection using TensorFlow.js and webcam">
	<link rel="icon" type="image/png" href="./assets/images/favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>
	<div class="app-container">
		<header>
			<h1>Rock Paper Scissors Image Classifier</h1>
		</header>

		<main>
			<!-- Video -->
			<div class="video-wrapper">
				<div class="video-container">
					<video id="videoElement" playsinline muted></video>
					<canvas id="canvasElement"></canvas>
				</div>
				<div id="modelStatus" class="status">Memuat Model...</div>
			</div>

			<!-- Info Cards -->
			<div class="info-grid">
				<!-- Prediction Card -->
				<div class="card prediction-card">
					<span class="prediction-subtitle">PREDICTION</span>
					<div class="label" id="predictionLabel">-</div>
					<div class="confidence-bar">
						<div id="confidenceBar" class="confidence-bar-fill"></div>
					</div>
					<div class="confidence" id="predictionConfidence">0%</div>
				</div>

				<!-- Controls Card -->
				<div class="card controls-card">
					<div class="control-group">
						<label for="cameraSelect">Camera Source</label>
						<select id="cameraSelect" disabled>
							<option>Memuat Kamera...</option>
						</select>
					</div>

					<div class="control-group">
						<div class="fps-header">
							<label for="fpsSelect">FPS Limit</label>
							<span id="fpsValue">30</span>
						</div>
						<input type="range" id="fpsSelect" min="5" max="60" value="30" step="5"
							oninput="document.getElementById('fpsValue').textContent = this.value">
					</div>

					<div class="control-buttons">
						<button id="startBtn" disabled>Start Camera</button>
						<button id="stopBtn" disabled>Stop Camera</button>
					</div>
				</div>
			</div>
		</main>

		<footer>
			<p>&copy; 2026 Rock Paper Scissors Image Classifier</p>
		</footer>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
	<script type="module" src="./assets/js/app.js"></script>
</body>

</html>
